<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Dark background circle -->
  <circle cx="32" cy="32" r="32" fill="#03030e"/>

  <!-- Outer glow ring -->
  <circle cx="32" cy="32" r="28" stroke="#00e5ff" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Hexagon shell -->
  <polygon
    points="32,6 54,19 54,45 32,58 10,45 10,19"
    fill="none"
    stroke="#00e5ff"
    stroke-width="1.8"
    stroke-linejoin="round"
    stroke-opacity="0.7"
  />

  <!-- Orbit ring -->
  <ellipse cx="32" cy="32" rx="14" ry="6" fill="none" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.6" transform="rotate(-20 32 32)"/>

  <!-- Planet / Earth -->
  <circle cx="32" cy="32" r="5.5" fill="#1e40af"/>
  <circle cx="32" cy="32" r="5.5" fill="url(#earthGrad)"/>

  <!-- Asteroid dot on orbit -->
  <circle cx="46" cy="27" r="2.5" fill="#00e5ff"/>
  <circle cx="46" cy="27" r="4" fill="#00e5ff" fill-opacity="0.2"/>

  <!-- Highlight sparkle -->
  <circle cx="21" cy="14" r="1" fill="#00e5ff" fill-opacity="0.6"/>
  <circle cx="44" cy="50" r="0.8" fill="#7c3aed" fill-opacity="0.7"/>
  <circle cx="14" cy="40" r="0.6" fill="#00e5ff" fill-opacity="0.5"/>

  <defs>
    <radialGradient id="earthGrad" cx="35%" cy="35%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </radialGradient>
  </defs>
</svg>
