services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: astroflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"        # host 5433 → container 5432 (avoids clash with local postgres)
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"        # host 6380 → container 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8001:8000"        # host 8001 → container 8000
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/astroflow
      REDIS_URL: redis://redis:6379/0
      NASA_API_KEY: ${NASA_API_KEY:-DEMO_KEY}
      CORS_ORIGINS: '["http://localhost:5174","http://localhost:3000"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build: ./frontend
    ports:
      - "5174:5174"        # host 5174 → container 5174
    environment:
      - BACKEND_HOST=backend:8000   # Docker service name — frontend proxy target inside the network
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules  # keep container node_modules separate from host

volumes:
  pgdata:
